<!-- Login Page View - Asset Compliance AI -->
<div class="login-layout">
  <div class="login-card">
    <div style="text-align: center; margin-bottom: 28px;">
      <div style="
        width: 48px;
        height: 48px;
        background-color: rgba(37, 99, 235, 0.1);
        border: 1px solid var(--cobalt-primary);
        border-radius: var(--radius-lg);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        font-size: 24px;
      ">🛡️</div>
      <h2 class="headline-md" style="margin-bottom: 6px; font-weight: 700; color: var(--on-surface);">Sign In</h2>
      <p class="body-sm" style="color: var(--on-surface-variant); margin: 0;">Enter your audit system API Key to proceed.</p>
    </div>
    
    <!-- Login status alert box -->
    <div id="login-alert-container"></div>

    <form id="login-form">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="login-api-key" class="form-label">System API Key</label>
        <input 
          type="password" 
          id="login-api-key" 
          class="input-field" 
          placeholder="ac_key_..." 
          required 
          autocomplete="current-password"
        >
      </div>
      
      <button 
        type="submit" 
        class="btn btn-primary" 
        style="width: 100%; height: 42px; font-weight: 600;" 
        id="login-submit-btn"
      >
        Verify Credentials
      </button>
    </form>

    <!-- Dev Mode auto-population helper container -->
    <div id="dev-helper-container" style="display: none; margin-top: 24px; padding-top: 16px; border-top: 1px dashed var(--slate-800); text-align: center;">
      <div class="badge badge-pending" style="margin-bottom: 8px; font-size: 10px; padding: 2px 8px;">Development Environment</div>
      <button class="btn btn-secondary" id="dev-autopopulate-btn" style="width: 100%; font-size: var(--fs-body-sm); padding: 6px 12px;">
        Auto-populate Default Dev Key
      </button>
    </div>
  </div>
</div>
